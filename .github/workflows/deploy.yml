name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build static site and publish to deploy branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Publish dist/ to deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: deploy
          # Keep a continuous branch history so downstream consumers
          # (Hostinger's git pull) can fast-forward. Orphan commits broke
          # Hostinger's "Deploy" button with "divergent branches" errors.
          force_orphan: false
          # Produce a deploy commit even when the build output is
          # byte-identical — this keeps Hostinger's pull detector in
          # sync with every main push.
          allow_empty_commit: true
          commit_message: "Deploy from ${{ github.sha }}"
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
