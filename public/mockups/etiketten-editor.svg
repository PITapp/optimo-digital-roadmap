<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Muster-Screenshot: Etiketten-Editor auf einem Laptop">
  <!-- Laptop display bezel -->
  <rect x="0" y="0" width="800" height="440" rx="8" fill="#1F2023"/>
  <rect x="20" y="20" width="760" height="400" rx="3" fill="#F7F6F3"/>
