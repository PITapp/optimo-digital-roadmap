<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 600" role="img" aria-label="Muster-Screenshot: Inventur-Ansicht auf einem Handheld-Scanner">
  <!-- Outer rugged housing -->
  <rect x="0" y="40" width="360" height="540" rx="22" fill="#1F2023"/>

  <!-- Side rubber bumpers (subtle wider edges) -->
  <rect x="0" y="100" width="14" height="380" rx="6" fill="#101113"/>
  <rect x="346" y="100" width="14" height="380" rx="6" fill="#101113"/>

  <!-- Scan optics housing (top) -->
  <rect x="40" y="0" width="280" height="64" rx="10" fill="#101113"/>
  <!-- Scan window (lens) -->
  <rect x="120" y="14" width="120" height="36" rx="6" fill="#0B0B0D" stroke="#3A3D44" stroke-width="1.5"/>
  <rect x="138" y="24" width="84" height="16" rx="3" fill="#C8102E" opacity="0.85"/>
  <!-- LED status -->
  <circle cx="64" cy="32" r="5" fill="#2F8F45"/>
  <text x="78" y="36" font-family="Inter, Arial, sans-serif" font-size="9" fill="#7A7D85" font-weight="600" letter-spacing="1.2">READY</text>

  <!-- Yellow scan trigger button at top -->
  <rect x="146" y="68" width="68" height="28" rx="14" fill="#F2B400" stroke="#A87E00" stroke-width="1.5"/>
  <text x="180" y="86" font-family="Inter, Arial, sans-serif" font-size="10" fill="#1A1A1C" font-weight="800" text-anchor="middle" letter-spacing="2">SCAN</text>

  <!-- Display bezel -->
  <rect x="32" y="110" width="296" height="356" rx="8" fill="#0B0B0D"/>
  <!-- Display screen -->
  <rect x="40" y="118" width="280" height="340" rx="4" fill="#F7F6F3"/>

  <!-- ===== Screen content ===== -->
  <!-- App header -->
  <rect x="52" y="130" width="256" height="46" rx="6" fill="#ECEAE5"/>
  <text x="64" y="148" font-family="Inter, Arial, sans-serif" font-size="10" fill="#8A8A90" font-weight="600">INVENTUR · HALLE 3</text>
  <text x="64" y="166" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1A1A1C" font-weight="700">Zählung läuft</text>
  <rect x="266" y="142" width="32" height="22" rx="11" fill="#C8102E"/>
  <text x="282" y="158" font-family="Inter, Arial, sans-serif" font-size="10" fill="#fff" font-weight="700" text-anchor="middle">12</text>

  <!-- Barcode scan target area -->
  <rect x="52" y="186" width="256" height="60" rx="6" fill="#14151A"/>
  <rect x="96" y="200" width="168" height="32" rx="4" fill="none" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="5 3"/>
  <g stroke="#fff" stroke-width="1.5">
    <line x1="106" y1="206" x2="106" y2="226"/>
    <line x1="114" y1="206" x2="114" y2="226" stroke-width="3"/>
    <line x1="122" y1="206" x2="122" y2="226"/>
    <line x1="130" y1="206" x2="130" y2="226" stroke-width="3"/>
    <line x1="140" y1="206" x2="140" y2="226"/>
    <line x1="148" y1="206" x2="148" y2="226" stroke-width="3"/>
    <line x1="156" y1="206" x2="156" y2="226"/>
    <line x1="164" y1="206" x2="164" y2="226"/>
    <line x1="174" y1="206" x2="174" y2="226" stroke-width="3"/>
    <line x1="182" y1="206" x2="182" y2="226"/>
    <line x1="192" y1="206" x2="192" y2="226"/>
    <line x1="202" y1="206" x2="202" y2="226" stroke-width="3"/>
    <line x1="210" y1="206" x2="210" y2="226"/>
    <line x1="220" y1="206" x2="220" y2="226" stroke-width="3"/>
    <line x1="230" y1="206" x2="230" y2="226"/>
    <line x1="240" y1="206" x2="240" y2="226"/>
    <line x1="250" y1="206" x2="250" y2="226" stroke-width="3"/>
  </g>

  <!-- List items -->
  <g font-family="Inter, Arial, sans-serif">
    <rect x="52" y="258" width="256" height="56" rx="6" fill="#fff" stroke="#E7E4DE"/>
    <text x="64" y="276" font-size="9" fill="#8A8A90" font-weight="600">ART-4502 · Matratzenkern</text>
    <text x="64" y="293" font-size="12" fill="#1A1A1C" font-weight="700">120 × 200 Comfort</text>
    <text x="64" y="307" font-size="10" fill="#666">Soll: 24 · Ist: 24</text>
    <circle cx="284" cy="286" r="11" fill="#E8F2E9"/>
    <path d="M280 286 l3 3 l6 -7" stroke="#2F8F45" stroke-width="2" fill="none" stroke-linecap="round"/>

    <rect x="52" y="324" width="256" height="56" rx="6" fill="#fff" stroke="#E7E4DE"/>
    <text x="64" y="342" font-size="9" fill="#8A8A90" font-weight="600">ART-4518 · Matratzenkern</text>
    <text x="64" y="359" font-size="12" fill="#1A1A1C" font-weight="700">140 × 200 Premium</text>
    <text x="64" y="373" font-size="10" fill="#C8102E" font-weight="600">Soll: 18 · Ist: 16 · Abweichung</text>
    <circle cx="284" cy="352" r="11" fill="#FCEAED"/>
    <text x="284" y="357" font-size="13" fill="#C8102E" text-anchor="middle" font-weight="700">!</text>

    <rect x="52" y="390" width="256" height="56" rx="6" fill="#fff" stroke="#E7E4DE"/>
    <text x="64" y="408" font-size="9" fill="#8A8A90" font-weight="600">ART-4730 · Lattenrost</text>
    <text x="64" y="425" font-size="12" fill="#1A1A1C" font-weight="700">90 × 200 Basic</text>
    <text x="64" y="439" font-size="10" fill="#666">Zählung läuft…</text>
    <circle cx="284" cy="418" r="11" fill="#EEECE7"/>
    <circle cx="284" cy="418" r="4" fill="#8A8A90"/>
  </g>

  <!-- Hardware keypad area -->
  <rect x="40" y="478" width="280" height="86" rx="8" fill="#101113"/>
  <!-- Big enter / scan key -->
  <rect x="148" y="492" width="64" height="34" rx="6" fill="#2A2D33" stroke="#3A3D44"/>
  <text x="180" y="513" font-family="Inter, Arial, sans-serif" font-size="10" fill="#D4D6DB" font-weight="700" text-anchor="middle" letter-spacing="1.5">ENTER</text>
  <!-- Side function keys -->
  <rect x="64" y="492" width="48" height="34" rx="6" fill="#2A2D33" stroke="#3A3D44"/>
  <text x="88" y="513" font-family="Inter, Arial, sans-serif" font-size="10" fill="#D4D6DB" font-weight="700" text-anchor="middle">F1</text>
  <rect x="248" y="492" width="48" height="34" rx="6" fill="#2A2D33" stroke="#3A3D44"/>
  <text x="272" y="513" font-family="Inter, Arial, sans-serif" font-size="10" fill="#D4D6DB" font-weight="700" text-anchor="middle">F2</text>
  <!-- OPTIMO label -->
  <text x="180" y="548" font-family="Inter, Arial, sans-serif" font-size="9" fill="#7A7D85" font-weight="700" text-anchor="middle" letter-spacing="3">OPTIMO · SCAN</text>

  <!-- Watermark -->
  <text x="180" y="596" font-family="Inter, Arial, sans-serif" font-size="9" fill="#B0AEA8" text-anchor="middle" letter-spacing="2">MUSTER · VORSCHAU</text>
</svg>
