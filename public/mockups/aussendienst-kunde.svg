    <text x="700" y="258" font-size="10" fill="#8A8A90" font-weight="600" text-anchor="end">12.04.2026</text>
    <text x="700" y="274" font-size="12" fill="#1A1A1C" font-weight="700" text-anchor="end">€ 6.480,–</text>

    <line x1="424" y1="288" x2="746" y2="288" stroke="#E7E4DE"/>

    <text x="424" y="306" font-size="10" fill="#1A1A1C" font-weight="700">AB-2026-0891</text>
    <text x="424" y="322" font-size="11" fill="#1A1A1C">22 Bettrahmen Eiche</text>
    <text x="700" y="306" font-size="10" fill="#8A8A90" font-weight="600" text-anchor="end">28.02.2026</text>
    <text x="700" y="322" font-size="12" fill="#1A1A1C" font-weight="700" text-anchor="end">€ 11.220,–</text>

    <line x1="424" y1="336" x2="746" y2="336" stroke="#E7E4DE"/>

    <text x="424" y="354" font-size="10" fill="#1A1A1C" font-weight="700">AB-2026-0612</text>
    <text x="424" y="370" font-size="11" fill="#1A1A1C">8 Boxspring Premium</text>
    <text x="700" y="354" font-size="10" fill="#8A8A90" font-weight="600" text-anchor="end">21.01.2026</text>
    <text x="700" y="370" font-size="12" fill="#1A1A1C" font-weight="700" text-anchor="end">€ 9.840,–</text>

    <text x="424" y="396" font-size="10" fill="#C8102E" font-weight="700" text-decoration="underline">Alle 12 Bestellungen ansehen</text>
