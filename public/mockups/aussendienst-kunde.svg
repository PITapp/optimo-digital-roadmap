<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Muster-Screenshot: Kundendetail in der Aussendienst-App auf einem Laptop">
  <!-- Laptop display bezel -->
  <rect x="0" y="0" width="800" height="440" rx="8" fill="#1F2023"/>
  <rect x="20" y="20" width="760" height="400" rx="3" fill="#F7F6F3"/>
  <circle cx="400" cy="10" r="2" fill="#0B0B0D"/>

  <!-- Laptop base -->
  <path d="M0 440 L800 440 L760 478 L40 478 Z" fill="#2A2D33"/>
  <rect x="370" y="448" width="60" height="6" rx="3" fill="#0B0B0D"/>
  <line x1="0" y1="440" x2="800" y2="440" stroke="#0B0B0D" stroke-width="1"/>

  <!-- ===== Display content ===== -->
