    <line x1="60" y1="342" x2="382" y2="342" stroke="#E7E4DE"/>

    <text x="60" y="362" font-size="9" fill="#8A8A90" font-weight="600">LETZTER BESUCH</text>
    <text x="60" y="380" font-size="12" fill="#1A1A1C" font-weight="600">18. März 2026</text>
