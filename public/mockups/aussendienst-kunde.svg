  <text x="118" y="194" font-family="Inter, Arial, sans-serif" font-size="11" fill="#8A8A90" font-weight="600">Bestellungen</text>
  <text x="206" y="194" font-family="Inter, Arial, sans-serif" font-size="11" fill="#8A8A90" font-weight="600">Artikel</text>
  <text x="266" y="194" font-family="Inter, Arial, sans-serif" font-size="11" fill="#8A8A90" font-weight="600">Notizen</text>
  <text x="328" y="194" font-family="Inter, Arial, sans-serif" font-size="11" fill="#8A8A90" font-weight="600">Kontakte</text>

