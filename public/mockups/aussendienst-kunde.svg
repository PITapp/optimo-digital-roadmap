  <rect x="666" y="120" width="86" height="32" rx="6" fill="#C8102E"/>
  <text x="709" y="140" font-family="Inter, Arial, sans-serif" font-size="11" fill="#fff" font-weight="600" text-anchor="middle">Angebot</text>

