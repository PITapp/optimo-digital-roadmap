    <text x="60" y="276" font-size="14" fill="#1A1A1C" font-weight="700">€ 42.180,–</text>

    <text x="220" y="258" font-size="9" fill="#8A8A90" font-weight="600">VORJAHR (gleicher Zeitraum)</text>
    <text x="220" y="276" font-size="14" fill="#1A1A1C" font-weight="700">€ 37.650,–</text>

