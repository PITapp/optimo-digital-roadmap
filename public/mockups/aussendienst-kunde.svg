  <text x="81" y="148" font-family="Inter, Arial, sans-serif" font-size="16" fill="#1A1A1C" font-weight="700" text-anchor="middle">S</text>

  <text x="116" y="130" font-family="Inter, Arial, sans-serif" font-size="10" fill="#8A8A90" font-weight="600">KUNDE 10042 · A-Kunde</text>
