<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 480" role="img" aria-label="Muster-Vorschau eines fertigen Optimo-Produktetiketts im Hochformat">
  <!-- Outer shadow/paper backdrop -->
  <rect x="0" y="0" width="360" height="480" fill="#F0EDE6"/>

  <!-- Label paper -->
  <rect x="12" y="12" width="336" height="456" rx="6" fill="#fff" stroke="#1A1A1C" stroke-width="0.8"/>

  <!-- Brand block -->
  <rect x="12" y="12" width="336" height="72" fill="#C8102E"/>
  <text x="180" y="54" font-family="Inter, Arial, sans-serif" font-size="28" fill="#fff" font-weight="800" text-anchor="middle" letter-spacing="5">OPTIMO</text>
  <text x="180" y="72" font-family="Inter, Arial, sans-serif" font-size="10" fill="#fff" font-weight="600" text-anchor="middle" letter-spacing="3" opacity="0.9">SCHLAFSYSTEME</text>

  <!-- Product name block -->
  <text x="180" y="116" font-family="Inter, Arial, sans-serif" font-size="20" fill="#1A1A1C" font-weight="700" text-anchor="middle">Matratze Comfort</text>
  <text x="180" y="138" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1A1A1C" text-anchor="middle">120 × 200 cm</text>
  <text x="180" y="158" font-family="Inter, Arial, sans-serif" font-size="12" fill="#666" text-anchor="middle">Härtegrad H3 · mittel</text>

  <line x1="36" y1="178" x2="324" y2="178" stroke="#E7E4DE"/>

  <!-- Hint block: electrical -->
  <rect x="36" y="190" width="288" height="38" rx="4" fill="#FFF8E6" stroke="#E8D88A"/>
  <text x="58" y="208" font-family="Inter, Arial, sans-serif" font-size="14" fill="#8A6F1A" font-weight="700">⚡</text>
  <text x="80" y="206" font-family="Inter, Arial, sans-serif" font-size="11" fill="#8A6F1A" font-weight="700" letter-spacing="0.8">ELEKTRISCHE FEDERLEISTE</text>
  <text x="80" y="220" font-family="Inter, Arial, sans-serif" font-size="10" fill="#8A6F1A">Vor Reinigung Stecker ziehen.</text>

  <!-- Symbol row (6 symbols) -->
  <g>
    <!-- Recycling arrows -->
    <rect x="36" y="244" width="44" height="44" rx="4" fill="#F7F6F3"/>
    <path d="M50 274 l8 -14 l8 14 l-8 -4 l-8 4 z M58 256 l9 9 l-9 0 z M67 270 l-9 9 l0 -9 z" fill="#2F8F45"/>

    <!-- FSC -->
    <rect x="88" y="244" width="44" height="44" rx="4" fill="#F7F6F3"/>
    <text x="110" y="270" font-family="Inter, Arial, sans-serif" font-size="13" fill="#2F8F45" font-weight="800" text-anchor="middle">FSC</text>
    <text x="110" y="282" font-family="Inter, Arial, sans-serif" font-size="7" fill="#2F8F45" font-weight="600" text-anchor="middle">MIX</text>

    <!-- Washing 30° -->
    <rect x="140" y="244" width="44" height="44" rx="4" fill="#F7F6F3"/>
    <path d="M150 268 q12 -14 24 0 q-12 14 -24 0 z" fill="none" stroke="#1A1A1C" stroke-width="1.6"/>
    <text x="162" y="282" font-family="Inter, Arial, sans-serif" font-size="11" fill="#1A1A1C" font-weight="700" text-anchor="middle">30°</text>

    <!-- Professional cleaning -->
    <rect x="192" y="244" width="44" height="44" rx="4" fill="#F7F6F3"/>
    <circle cx="214" cy="266" r="12" fill="none" stroke="#1A1A1C" stroke-width="1.6"/>
    <text x="214" y="271" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1A1A1C" font-weight="800" text-anchor="middle">P</text>

    <!-- CE -->
    <rect x="244" y="244" width="44" height="44" rx="4" fill="#F7F6F3"/>
    <text x="266" y="272" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1A1A1C" font-weight="800" text-anchor="middle">CE</text>

    <!-- Made in Austria flag -->
    <rect x="296" y="244" width="44" height="44" rx="4" fill="#F7F6F3"/>
    <rect x="308" y="252" width="20" height="28" rx="1.5" fill="#fff" stroke="#1A1A1C" stroke-width="0.8"/>
    <rect x="308" y="252" width="20" height="8" fill="#C8102E"/>
    <rect x="308" y="272" width="20" height="8" fill="#C8102E"/>
    <text x="318" y="288" font-family="Inter, Arial, sans-serif" font-size="6" fill="#1A1A1C" font-weight="700" text-anchor="middle">AT</text>
  </g>

  <line x1="36" y1="304" x2="324" y2="304" stroke="#E7E4DE"/>

  <!-- Material composition block -->
  <text x="36" y="324" font-family="Inter, Arial, sans-serif" font-size="9" fill="#8A8A90" font-weight="700" letter-spacing="1.2">MATERIAL</text>
  <text x="36" y="340" font-family="Inter, Arial, sans-serif" font-size="11" fill="#1A1A1C">Bezug: 60 % Polyester · 40 % Baumwolle</text>
  <text x="36" y="354" font-family="Inter, Arial, sans-serif" font-size="11" fill="#1A1A1C">Kern: Kaltschaum RG40 · 7 Liegezonen</text>

  <line x1="36" y1="370" x2="324" y2="370" stroke="#E7E4DE"/>

  <!-- Footer: article info + barcode -->
  <text x="36" y="390" font-family="Inter, Arial, sans-serif" font-size="9" fill="#8A8A90" font-weight="700" letter-spacing="1.2">ARTIKEL-NR.</text>
  <text x="36" y="408" font-family="Inter, Arial, sans-serif" font-size="14" fill="#1A1A1C" font-weight="700">ART-4502</text>

  <text x="36" y="426" font-family="Inter, Arial, sans-serif" font-size="9" fill="#8A8A90" font-weight="600">CHARGE 2026-19 · 12. MAI 2026</text>

  <!-- Barcode -->
  <g stroke="#1A1A1C" stroke-width="1.4">
    <line x1="208" y1="386" x2="208" y2="430"/>
    <line x1="213" y1="386" x2="213" y2="430" stroke-width="2.5"/>
    <line x1="220" y1="386" x2="220" y2="430"/>
    <line x1="225" y1="386" x2="225" y2="430"/>
    <line x1="232" y1="386" x2="232" y2="430" stroke-width="2.5"/>
    <line x1="238" y1="386" x2="238" y2="430"/>
    <line x1="244" y1="386" x2="244" y2="430" stroke-width="2.5"/>
    <line x1="251" y1="386" x2="251" y2="430"/>
    <line x1="257" y1="386" x2="257" y2="430"/>
    <line x1="263" y1="386" x2="263" y2="430" stroke-width="2.5"/>
    <line x1="270" y1="386" x2="270" y2="430"/>
    <line x1="276" y1="386" x2="276" y2="430" stroke-width="2.5"/>
    <line x1="283" y1="386" x2="283" y2="430"/>
    <line x1="289" y1="386" x2="289" y2="430"/>
    <line x1="295" y1="386" x2="295" y2="430" stroke-width="2.5"/>
    <line x1="302" y1="386" x2="302" y2="430"/>
    <line x1="308" y1="386" x2="308" y2="430" stroke-width="2.5"/>
    <line x1="315" y1="386" x2="315" y2="430"/>
  </g>
  <text x="262" y="444" font-family="Inter, Arial, sans-serif" font-size="9" fill="#1A1A1C" font-weight="700" text-anchor="middle">4502 120200 H3 26W19</text>

  <!-- Watermark stamp (diagonal across label) -->
  <text x="180" y="458" font-family="Inter, Arial, sans-serif" font-size="8" fill="#B0AEA8" text-anchor="middle" letter-spacing="2">MUSTER · VORSCHAU</text>
</svg>
