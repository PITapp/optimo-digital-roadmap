  <text x="262" y="356" font-family="Inter, Arial, sans-serif" font-size="9" fill="#8A8A90" font-weight="600">ENTFERNUNG</text>
  <text x="262" y="372" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1A1A1C" font-weight="700">12,4 km · 18 Min.</text>

  <text x="262" y="392" font-family="Inter, Arial, sans-serif" font-size="9" fill="#8A8A90" font-weight="600">POSITIONEN</text>
  <text x="262" y="408" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1A1A1C" font-weight="700">6 Lieferpositionen</text>

  <text x="262" y="428" font-family="Inter, Arial, sans-serif" font-size="9" fill="#8A8A90" font-weight="600">HINWEIS</text>
  <text x="262" y="444" font-family="Inter, Arial, sans-serif" font-size="11" fill="#1A1A1C">Anlieferung über Hofeinfahrt</text>
  <text x="262" y="458" font-family="Inter, Arial, sans-serif" font-size="11" fill="#1A1A1C">links, Klingel „Lager".</text>

  <!-- Detail action button -->
  <rect x="262" y="478" width="172" height="20" rx="5" fill="#ECEAE5"/>
  <text x="348" y="492" font-family="Inter, Arial, sans-serif" font-size="10" fill="#1A1A1C" font-weight="700" text-anchor="middle">Lieferschein öffnen</text>

  <!-- Primary button (bottom span both columns) -->
  <rect x="32" y="528" width="416" height="56" rx="10" fill="#C8102E"/>
  <text x="240" y="556" font-family="Inter, Arial, sans-serif" font-size="14" fill="#fff" font-weight="700" text-anchor="middle">Navigation zu Stopp 3 starten</text>
  <text x="240" y="572" font-family="Inter, Arial, sans-serif" font-size="10" fill="#fff" font-weight="500" text-anchor="middle" opacity="0.85">12,4 km · 18 Minuten</text>

  <!-- Watermark -->
  <text x="240" y="610" font-family="Inter, Arial, sans-serif" font-size="9" fill="#B0AEA8" text-anchor="middle" letter-spacing="2">MUSTER · VORSCHAU</text>
