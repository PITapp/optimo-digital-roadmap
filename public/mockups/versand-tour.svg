<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" role="img" aria-label="Muster-Screenshot: Tourenuebersicht der Versand-App auf einem Tablet">
  <!-- Tablet frame -->
  <rect x="0" y="0" width="480" height="640" rx="24" fill="#1F2023"/>
  <rect x="14" y="14" width="452" height="612" rx="14" fill="#F7F6F3"/>
