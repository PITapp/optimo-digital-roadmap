<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 600" role="img" aria-label="Muster-Screenshot: Artikelinformation auf einem Handheld-Scanner">
  <!-- Outer rugged housing -->
  <rect x="0" y="40" width="360" height="540" rx="22" fill="#1F2023"/>
  <rect x="0" y="100" width="14" height="380" rx="6" fill="#101113"/>
  <rect x="346" y="100" width="14" height="380" rx="6" fill="#101113"/>

  <!-- Scan optics housing -->
  <rect x="40" y="0" width="280" height="64" rx="10" fill="#101113"/>
  <rect x="120" y="14" width="120" height="36" rx="6" fill="#0B0B0D" stroke="#3A3D44" stroke-width="1.5"/>
  <rect x="138" y="24" width="84" height="16" rx="3" fill="#C8102E" opacity="0.85"/>
  <circle cx="64" cy="32" r="5" fill="#2F8F45"/>
  <text x="78" y="36" font-family="Inter, Arial, sans-serif" font-size="9" fill="#7A7D85" font-weight="600" letter-spacing="1.2">READY</text>

  <!-- Yellow scan trigger -->
  <rect x="146" y="68" width="68" height="28" rx="14" fill="#F2B400" stroke="#A87E00" stroke-width="1.5"/>
  <text x="180" y="86" font-family="Inter, Arial, sans-serif" font-size="10" fill="#1A1A1C" font-weight="800" text-anchor="middle" letter-spacing="2">SCAN</text>

  <!-- Display -->
  <rect x="32" y="110" width="296" height="356" rx="8" fill="#0B0B0D"/>
  <rect x="40" y="118" width="280" height="340" rx="4" fill="#F7F6F3"/>

  <!-- Header -->
  <path d="M60 142 l-8 6 l8 6" stroke="#1A1A1C" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="76" y="152" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1A1A1C" font-weight="700">Artikelinformation</text>

  <!-- Product info block -->
  <rect x="52" y="166" width="256" height="92" rx="8" fill="#fff" stroke="#E7E4DE"/>
  <rect x="64" y="178" width="56" height="68" rx="6" fill="#ECEAE5"/>
  <rect x="72" y="192" width="40" height="8" rx="2" fill="#C0BCB3"/>
  <rect x="72" y="206" width="32" height="5" rx="2" fill="#D6D3CC"/>
  <rect x="72" y="216" width="36" height="5" rx="2" fill="#D6D3CC"/>
  <rect x="72" y="226" width="28" height="5" rx="2" fill="#D6D3CC"/>

  <text x="132" y="190" font-family="Inter, Arial, sans-serif" font-size="9" fill="#8A8A90" font-weight="600">ART-4518</text>
  <text x="132" y="208" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1A1A1C" font-weight="700">Matratze Premium</text>
  <text x="132" y="223" font-family="Inter, Arial, sans-serif" font-size="11" fill="#1A1A1C">140 × 200 cm</text>
  <text x="132" y="240" font-family="Inter, Arial, sans-serif" font-size="9" fill="#666">Serie NextGen · KT-Liga 3</text>

  <!-- KPI grid -->
  <g font-family="Inter, Arial, sans-serif">
    <rect x="52" y="270" width="122" height="68" rx="6" fill="#fff" stroke="#E7E4DE"/>
    <text x="64" y="288" font-size="9" fill="#8A8A90" font-weight="600">BESTAND GESAMT</text>
    <text x="64" y="314" font-size="22" fill="#1A1A1C" font-weight="700">164</text>
    <text x="113" y="314" font-size="10" fill="#8A8A90">Stk.</text>
    <text x="64" y="330" font-size="10" fill="#2F8F45" font-weight="600">▲ verfügbar</text>

    <rect x="184" y="270" width="124" height="68" rx="6" fill="#fff" stroke="#E7E4DE"/>
    <text x="196" y="288" font-size="9" fill="#8A8A90" font-weight="600">RESERVIERT</text>
    <text x="196" y="314" font-size="22" fill="#1A1A1C" font-weight="700">38</text>
    <text x="226" y="314" font-size="10" fill="#8A8A90">Stk.</text>
    <text x="196" y="330" font-size="10" fill="#666">5 Aufträge</text>
  </g>

  <!-- Lagerorte -->
  <text x="52" y="360" font-family="Inter, Arial, sans-serif" font-size="10" fill="#8A8A90" font-weight="700" letter-spacing="1.5">LAGERORTE</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="52" y="368" width="256" height="36" rx="6" fill="#fff" stroke="#E7E4DE"/>
    <text x="64" y="384" font-size="11" fill="#1A1A1C" font-weight="700">Halle 3 · Regal A-18</text>
    <text x="64" y="397" font-size="9" fill="#666">112 Stück</text>
    <text x="294" y="390" font-size="12" fill="#C8102E" font-weight="700" text-anchor="end">→</text>

    <rect x="52" y="410" width="256" height="36" rx="6" fill="#fff" stroke="#E7E4DE"/>
    <text x="64" y="426" font-size="11" fill="#1A1A1C" font-weight="700">Halle 3 · Regal A-19</text>
    <text x="64" y="439" font-size="9" fill="#666">44 Stück</text>
    <text x="294" y="432" font-size="12" fill="#C8102E" font-weight="700" text-anchor="end">→</text>
  </g>

  <!-- Hardware keypad -->
  <rect x="40" y="478" width="280" height="86" rx="8" fill="#101113"/>
  <rect x="148" y="492" width="64" height="34" rx="6" fill="#2A2D33" stroke="#3A3D44"/>
  <text x="180" y="513" font-family="Inter, Arial, sans-serif" font-size="10" fill="#D4D6DB" font-weight="700" text-anchor="middle" letter-spacing="1.5">ENTER</text>
  <rect x="64" y="492" width="48" height="34" rx="6" fill="#2A2D33" stroke="#3A3D44"/>
  <text x="88" y="513" font-family="Inter, Arial, sans-serif" font-size="10" fill="#D4D6DB" font-weight="700" text-anchor="middle">F1</text>
  <rect x="248" y="492" width="48" height="34" rx="6" fill="#2A2D33" stroke="#3A3D44"/>
  <text x="272" y="513" font-family="Inter, Arial, sans-serif" font-size="10" fill="#D4D6DB" font-weight="700" text-anchor="middle">F2</text>
  <text x="180" y="548" font-family="Inter, Arial, sans-serif" font-size="9" fill="#7A7D85" font-weight="700" text-anchor="middle" letter-spacing="3">OPTIMO · SCAN</text>

  <!-- Watermark -->
  <text x="180" y="596" font-family="Inter, Arial, sans-serif" font-size="9" fill="#B0AEA8" text-anchor="middle" letter-spacing="2">MUSTER · VORSCHAU</text>
</svg>
