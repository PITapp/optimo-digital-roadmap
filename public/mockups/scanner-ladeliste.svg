<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 600" role="img" aria-label="Muster-Screenshot: Ladeliste für LKW-Beladung auf einem Handheld-Scanner">
  <!-- Outer rugged housing -->
  <rect x="0" y="40" width="360" height="540" rx="22" fill="#1F2023"/>
  <rect x="0" y="100" width="14" height="380" rx="6" fill="#101113"/>
  <rect x="346" y="100" width="14" height="380" rx="6" fill="#101113"/>

  <!-- Scan optics housing -->
  <rect x="40" y="0" width="280" height="64" rx="10" fill="#101113"/>
  <rect x="120" y="14" width="120" height="36" rx="6" fill="#0B0B0D" stroke="#3A3D44" stroke-width="1.5"/>
  <rect x="138" y="24" width="84" height="16" rx="3" fill="#C8102E" opacity="0.85"/>
  <circle cx="64" cy="32" r="5" fill="#2F8F45"/>
  <text x="78" y="36" font-family="Inter, Arial, sans-serif" font-size="9" fill="#7A7D85" font-weight="600" letter-spacing="1.2">READY</text>

  <!-- Yellow scan trigger -->
  <rect x="146" y="68" width="68" height="28" rx="14" fill="#F2B400" stroke="#A87E00" stroke-width="1.5"/>
  <text x="180" y="86" font-family="Inter, Arial, sans-serif" font-size="10" fill="#1A1A1C" font-weight="800" text-anchor="middle" letter-spacing="2">SCAN</text>

  <!-- Display -->
  <rect x="32" y="110" width="296" height="356" rx="8" fill="#0B0B0D"/>
  <rect x="40" y="118" width="280" height="340" rx="4" fill="#F7F6F3"/>

  <!-- Header with back arrow -->
  <path d="M60 142 l-8 6 l8 6" stroke="#1A1A1C" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="76" y="152" font-family="Inter, Arial, sans-serif" font-size="13" fill="#1A1A1C" font-weight="700">Ladeliste LKW-041</text>

  <!-- Progress banner -->
  <rect x="52" y="166" width="256" height="60" rx="6" fill="#14151A"/>
  <text x="68" y="186" font-family="Inter, Arial, sans-serif" font-size="9" fill="#B0AEA8" font-weight="600">FORTSCHRITT</text>
  <text x="68" y="206" font-family="Inter, Arial, sans-serif" font-size="17" fill="#fff" font-weight="700">7 / 12 Positionen</text>
  <rect x="68" y="214" width="224" height="3" rx="1.5" fill="#2A2C32"/>
  <rect x="68" y="214" width="131" height="3" rx="1.5" fill="#C8102E"/>

  <!-- Checklist items -->
  <g font-family="Inter, Arial, sans-serif">
    <rect x="52" y="234" width="256" height="44" rx="6" fill="#fff" stroke="#E7E4DE"/>
    <circle cx="72" cy="256" r="8" fill="#2F8F45"/>
    <path d="M67 256 l3 3 l6 -6" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <text x="88" y="252" font-size="9" fill="#8A8A90" font-weight="600">POS 01 · 4 × 200 × 200</text>
    <text x="88" y="267" font-size="12" fill="#1A1A1C" font-weight="700" text-decoration="line-through">Pallet A-12 · Bereich 1</text>

    <rect x="52" y="284" width="256" height="44" rx="6" fill="#fff" stroke="#E7E4DE"/>
    <circle cx="72" cy="306" r="8" fill="#2F8F45"/>
    <path d="M67 306 l3 3 l6 -6" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <text x="88" y="302" font-size="9" fill="#8A8A90" font-weight="600">POS 02 · 2 × 140 × 200</text>
    <text x="88" y="317" font-size="12" fill="#1A1A1C" font-weight="700" text-decoration="line-through">Pallet A-15 · Bereich 1</text>

    <!-- active -->
    <rect x="52" y="334" width="256" height="60" rx="6" fill="#FCEAED" stroke="#C8102E" stroke-width="1.5"/>
    <circle cx="72" cy="364" r="8" fill="none" stroke="#C8102E" stroke-width="2"/>
    <text x="88" y="356" font-size="9" fill="#C8102E" font-weight="700">JETZT SCANNEN · POS 03</text>
    <text x="88" y="372" font-size="13" fill="#1A1A1C" font-weight="700">3 × Lattenrost 90 × 200</text>
    <text x="88" y="386" font-size="10" fill="#666">Pallet A-18 · Bereich 2</text>

    <rect x="52" y="400" width="256" height="44" rx="6" fill="#fff" stroke="#E7E4DE"/>
    <circle cx="72" cy="422" r="8" fill="none" stroke="#C0BCB3" stroke-width="2"/>
    <text x="88" y="418" font-size="9" fill="#8A8A90" font-weight="600">POS 04 · 2 × 160 × 200</text>
    <text x="88" y="433" font-size="12" fill="#1A1A1C" font-weight="600">Pallet B-03 · Bereich 2</text>
  </g>

  <!-- Hardware keypad -->
  <rect x="40" y="478" width="280" height="86" rx="8" fill="#101113"/>
  <rect x="148" y="492" width="64" height="34" rx="6" fill="#2A2D33" stroke="#3A3D44"/>
  <text x="180" y="513" font-family="Inter, Arial, sans-serif" font-size="10" fill="#D4D6DB" font-weight="700" text-anchor="middle" letter-spacing="1.5">ENTER</text>
  <rect x="64" y="492" width="48" height="34" rx="6" fill="#2A2D33" stroke="#3A3D44"/>
  <text x="88" y="513" font-family="Inter, Arial, sans-serif" font-size="10" fill="#D4D6DB" font-weight="700" text-anchor="middle">F1</text>
  <rect x="248" y="492" width="48" height="34" rx="6" fill="#2A2D33" stroke="#3A3D44"/>
  <text x="272" y="513" font-family="Inter, Arial, sans-serif" font-size="10" fill="#D4D6DB" font-weight="700" text-anchor="middle">F2</text>
  <text x="180" y="548" font-family="Inter, Arial, sans-serif" font-size="9" fill="#7A7D85" font-weight="700" text-anchor="middle" letter-spacing="3">OPTIMO · SCAN</text>

  <!-- Watermark -->
  <text x="180" y="596" font-family="Inter, Arial, sans-serif" font-size="9" fill="#B0AEA8" text-anchor="middle" letter-spacing="2">MUSTER · VORSCHAU</text>
</svg>
